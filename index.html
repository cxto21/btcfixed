    // Enable class-based dark mode for Tailwind CDN
    tailwind.config = { darkMode: 'class' };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF;
      --foreground: #000000;
      --btc-orange: #F7931A;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f5f5f5;
      color: var(--foreground);
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.3s ease;
    }
    body.dark {
      background-color: #000;
    }
    #root {
      position: relative;
      background: white;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color 0.3s ease;
    }
    .dark #root {
      background: #111;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-modern {
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    ::-webkit-scrollbar { display: none; }

    /* Light mode: override all gray/slate/zinc text shades to black */
    body:not(.dark) [class*="text-gray-"],
    body:not(.dark) [class*="text-slate-"],
    body:not(.dark) [class*="text-zinc-"],
    body:not(.dark) [class*="text-neutral-"] {
      color: #000;
    }

    /* Utility classes kept for backward compat with other pages */
    .neo-shadow { box-shadow: none; }
    .neo-shadow-orange { box-shadow: none; }
    .mono-card {
      background: #FFFFFF;
      border: 1px solid #e5e7eb;
      border-radius: 1rem;
      transition: all 0.2s ease;
    }
    .dark .mono-card {
      background: #1a1a1a;
      border-color: rgba(255,255,255,0.1);
    }
    .btn-orange {
      background: var(--btc-orange);
      color: #FFFFFF;
      border-radius: 0.75rem;
      transition: all 0.2s ease;
    }
    .btn-orange:active {
      opacity: 0.9;
      transform: scale(0.98);
    }
    .btn-black {
      background: #000000;
      color: #FFFFFF;
      border-radius: 0.75rem;
      transition: all 0.2s ease;
    }
    .dark .btn-black {
      background: #FFFFFF;
      color: #000000;
    }
    .btn-black:active {
      opacity: 0.9;
      transform: scale(0.98);
    }
    .btn-outline {
      border: 1px solid #e5e7eb;
      background: transparent;
      color: #000000;
      border-radius: 0.75rem;
    }
    .dark .btn-outline {
      border-color: rgba(255,255,255,0.15);
      color: #FFFFFF;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {

            orange: {
              DEFAULT: '#F7931A'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script>
    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
